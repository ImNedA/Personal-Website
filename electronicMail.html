<html lang="en">
<div class="content-wrapper">
    <head>
        <meta charset="UTF-8">
        <title>Contact Me</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="contact">
    <script src="./js/script.js" defer></script>

    <nav>
        <h1>Ned Arnold</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="electronicMail.html">Electronic Mail</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h2>Send Me Some Electronic Mail!</h2>
        <h4>Any message you send here will go to a receipt printer in my house.</h4>

        <p>Send me a message:</p>

        <input id="textInput" placeholder="Enter Message">
        <button type="button" id="printTextBtn">Print Text</button>
        
        <p>Or send me a picture!</p>
        
        <input type="file" id="imageInput" accept="image/png,image/jpeg,image/webp">
        <button id="printImageBtn">Print Image</button>

        <div id="previewContainer" style="margin-top: 20px; display: none;">
            <p>Preview:</p>
            <img id="imagePreview" alt="Image preview" style="max-width: 300px; max-height: 400px; border: 1px solid #ccc;">
        </div>

    </main>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

    </body>
</div>
</html>
